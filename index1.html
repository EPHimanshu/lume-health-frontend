<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>TestNear — Compare Test Prices</title>
  <style>
    body{margin:0;font-family:system-ui;background:#f7f8fc;color:#0b1220}
    .wrap{max-width:980px;margin:0 auto;padding:18px}
    .card{background:#fff;border:1px solid rgba(0,0,0,.12);border-radius:18px;padding:14px}
    .row{display:grid;grid-template-columns:1fr;gap:10px}
    @media(min-width:850px){.row{grid-template-columns:1.2fr 1.2fr .8fr}}
    input,select{width:100%;padding:12px;border-radius:14px;border:1px solid rgba(0,0,0,.12);font-weight:900}
    .btn{border:none;border-radius:14px;padding:12px 14px;font-weight:950;cursor:pointer;background:linear-gradient(90deg,#752092,#5c1682);color:#fff}
    .chk{display:flex;gap:10px;align-items:center;font-weight:900;color:#374151}
  </style>
</head>
<body>
  <div class="wrap">
    <h1 style="margin:0 0 10px">Compare medical test prices</h1>
    <div class="card">
      <div class="row">
        <div>
          <div style="font-weight:950;margin:0 0 6px">Test</div>
          <input id="test" value="CBC" placeholder="CBC / Vitamin D / HbA1c"/>
        </div>
        <div>
          <div style="font-weight:950;margin:0 0 6px">City</div>
          <input id="city" value="Delhi" placeholder="Delhi / Jaipur"/>
        </div>
        <div>
          <div style="font-weight:950;margin:0 0 6px">Mode</div>
          <select id="mode">
            <option value="best">Best</option>
            <option value="cheap">Cheapest</option>
            <option value="fast">Fastest</option>
          </select>
        </div>
      </div>

      <div style="display:flex;gap:14px;flex-wrap:wrap;margin-top:12px">
        <label class="chk"><input id="home" type="checkbox"> Home sample</label>
        <label class="chk"><input id="nabl" type="checkbox"> NABL</label>
      </div>

      <div style="margin-top:12px">
        <button class="btn" type="button" onclick="go()">Search</button>
      </div>
    </div>
  </div>

<script>
function go(){
  const test = encodeURIComponent(document.getElementById("test").value.trim() || "CBC");
  const city = encodeURIComponent(document.getElementById("city").value.trim() || "Delhi");
  const mode = encodeURIComponent(document.getElementById("mode").value || "best");
  const home = document.getElementById("home").checked ? "1" : "0";
  const nabl = document.getElementById("nabl").checked ? "1" : "0";
  location.href = `results.html?test=${test}&city=${city}&mode=${mode}&home=${home}&nabl=${nabl}`;
}
</script>
</body>
</html>
